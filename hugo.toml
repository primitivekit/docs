baseURL = 'https://primitivekit.com/'
title = 'PrimitiveKit'
publishDir = 'build'

[module]
[[module.imports]]
path = "github.com/imfing/hextra"

enableRobotsTXT = true
enableGitInfo = true
enableEmoji = true
hasCJKLanguage = false

[services.googleAnalytics]
ID = ''

[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
noClasses = false

