[params]
description = "A flexible, accessible React component library with 600+ design tokens. Zero hardcoded values. Complete customization."
navbar.displayTitle = true
navbar.displayLogo = false
page.width = "wide"
theme.default = "system"
theme.displayToggle = true
footer.displayCopyright = true
footer.displayPoweredBy = false
editURL.enable = true
editURL.base = "https://github.com/primitivekit/docs/edit/main/content"

[params.search]
enable = false
