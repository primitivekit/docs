baseURL = 'https://primitivekit.com/'
title = 'PrimitiveKit'
publishDir = 'build'

[module]
[[module.imports]]
path = "github.com/imfing/hextra"

enableRobotsTXT = true
enableGitInfo = true
enableEmoji = false
hasCJKLanguage = false

# Output formats for markdown and llms.txt
[outputs]
home = ["html", "rss", "llms"]
page = ["html", "markdown"]
section = ["html", "rss", "markdown"]

[services.googleAnalytics]
ID = ''

[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
noClasses = false

