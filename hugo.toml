[params]
description = "A flexible, accessible React component library with 600+ design tokens. Zero hardcoded values. Complete customization."

# Navbar
[params.navbar]
displayTitle = true
displayLogo = false
width = "wide"

# Page
[params.page]
width = "wide"
displayPagination = true

# Page Context Menu (Copy, View Markdown, Open in ChatGPT/Claude)
[params.page.contextMenu]
enable = true

[[params.page.contextMenu.links]]
name = "Open in ChatGPT"
icon = "chatgpt"
url = "https://chatgpt.com/?hints=search&q=I%27m+looking+at+this+documentation%3A+{url}%0AHelp+me+understand+how+to+use+it."

[[params.page.contextMenu.links]]
name = "Open in Claude"
icon = "sparkles"
url = "https://claude.ai/new?q=I%27m+looking+at+this+documentation%3A+{url}%0AHelp+me+understand+how+to+use+it."

# Theme
[params.theme]
default = "system"
displayToggle = true

# Footer
[params.footer]
displayCopyright = true
displayPoweredBy = false
width = "wide"

# Edit URL
[params.editURL]
enable = true
base = "https://github.com/primitivekit/docs/edit/main/content"

# Search - FlexSearch
[params.search]
enable = true
type = "flexsearch"

[params.search.flexsearch]
index = "content"
tokenize = "forward"

# Display last updated date and author
displayUpdatedDate = true
dateFormat = "January 2, 2006"
displayUpdatedAuthor = true

# Table of Contents
[params.toc]
displayTags = true

# Blog
[params.blog]
[params.blog.list]
displayTags = true

[params.blog.article]
displayPagination = true

# Image Zoom
[params.imageZoom]
enable = true

# External Link Decoration
externalLinkDecoration = true
